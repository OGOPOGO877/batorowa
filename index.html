<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>batorowa - テスト/練習版</title>
  <style>
    body {
      margin: 0;
      background: #0a0f1a;
      color: #ddd;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
    }
    .container {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      color: #0f0;
      font-size: 2.4rem;
      margin-bottom: 8px;
      text-shadow: 0 0 10px #003300;
    }
    .subtitle {
      color: #8f8;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    .hero {
      background: #111a2b;
      border: 1px solid #0a3;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      background: #0a3;
      color: #fff;
      padding: 14px 28px;
      font-size: 1.15rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 6px;
      margin: 8px;
      transition: all 0.2s;
      border: 2px solid #0f0;
    }
    .btn:hover {
      background: #0c4;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px #003300;
    }
    .btn.secondary {
      background: #223;
      border-color: #556;
      color: #0ff;
    }
    .btn.secondary:hover { background: #334; }
    .section {
      background: #111a2b;
      border: 1px solid #334;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    a { color: #0ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ばとろわ</h1>
    <div class="subtitle">Phaser 3 で作ってるサバイバル風ゲームの<strong>テスト/練習版</strong></div>

    <div class="hero">
      <p style="font-size:1.3rem; margin:10px 0 20px;">今すぐ遊べる練習モードを公開中</p>
      <a href="test.html" class="btn">▶ テスト版をプレイする（おすすめ）</a>
      <a href="map_editor.html" class="btn secondary">🗺 マップエディタを開く</a>
    </div>

    <div class="section">
      <h2 style="color:#0f0; margin-top:0;">主な操作</h2>
      <div class="controls">
        <div>WASD / 矢印：移動<br>マウス：視界方向</div>
        <div>左クリック：射撃<br>Space：近くのアイテム拾得</div>
        <div>F8：デバッグ表示トグル<br>F9：リスタート</div>
        <div>画面の [-] [+]：音量調整<br>（自分の足音・銃声・全体）</div>
      </div>
    </div>
  </div>
</body>
</html>
